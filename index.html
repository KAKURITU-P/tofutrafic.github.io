<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>近隣駅列車運行状況</title>
    <style>
        * { box-sizing: border-box; }
        
        /* 16:9の画面内に絶対にすべてを収める設定 */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            padding: 1vh 1.5vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* ヘッダーの高さを少し抑えてメイン領域を広く */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #222;
            padding-bottom: 0.5vh;
            height: 7vh;
        }
        .board-title { font-size: 2.5vh; font-weight: bold; color: #888; }
        .clock { font-size: 5vh; font-weight: bold; color: #fff; font-family: monospace; }
        
        /* 上下線ブロックを包むメインコンテナ */
        .station-card { 
            display: flex; 
            flex-grow: 1;
            flex-direction: column;
            justify-content: space-between;
            height: 80vh; /* 全体の8割の高さに固定 */
            perspective: 1000px;
            margin: 1vh 0;
        }
        
        /* 駅名表示 */
        .station-name { 
            font-size: 3.8vh; 
            font-weight: bold; 
            height: 5vh;
            display: flex;
            align-items: center;
            padding-left: 1vw;
            animation: flipHeader 0.4s ease-out forwards;
            transform-origin: top center;
        }
        
        @keyframes flipHeader {
            0% { transform: rotateX(90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }
        
        .header-marunouchi { color: #ff0055; border-left: 10px solid #ff0055; }
        .header-oedo { color: #ff00b3; border-left: 10px solid #ff00b3; }
        .header-keio { color: #00bfff; border-left: 10px solid #00bfff; }
        
        /* ★ 上り・下りの各ブロック：高さを35vhに固定して、はみ出しを絶対防止 */
        .direction-block { 
            background: #000;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            padding: 1vh 1.5vw;
            height: 35vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* 方向名（「▼ 六本木・大門方面」など） */
        .direction-name { 
            font-size: 2.5vh; 
            font-weight: bold; 
            color: #ccc;
            border-bottom: 2px solid #222;
            padding-bottom: 0.3vh;
            margin-bottom: 0.5vh;
            height: 3.5vh;
        }
        
        /* 🔄 パタパタアニメーション */
        .flop-anime {
            animation: flipBoard 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transform-origin: top center;
        }
        @keyframes flipBoard {
            0% { transform: rotateX(-90deg); opacity: 0; background: #050505; }
            100% { transform: rotateX(0deg); opacity: 1; background: #0c0c0c; }
        }
        
        /* 列車情報行：2つの方向が収まる限界のベストサイズ（約11vh） */
        .bbs-row { 
            display: flex; 
            align-items: center; 
            padding: 0 1.5vw; 
            margin: 0.4vh 0; 
            height: 11vh;
            font-family: 'Courier New', Courier, monospace, sans-serif; 
            font-weight: bold;
            font-size: 4vh; 
            border-radius: 6px;
            background: #0c0c0c;
            border: 1px solid #222;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        
        /* バッジ類 */
        .bbs-mode { 
            width: 18vw; 
            font-size: 2.3vh; 
            padding: 0.8vh 0;
            border-radius: 4px;
            text-align: center;
            margin-right: 2vw;
            flex-shrink: 0;
        }
        .bg-dash { background: #ff8c00; color: #000; }
        .bg-walk { background: #2cd32c; color: #000; }
        
        /* 发车時刻（LED風オレンジ） */
        .bbs-time { 
            width: 12vw; 
            text-align: center; 
            font-size: 4.5vh; 
            color: #ffcc00; 
            font-family: 'Courier New', monospace;
            flex-shrink: 0;
        }
        
        /* 種別 */
        .type-badge {
            width: 10vw;
            text-align: center;
            font-size: 2.3vh;
            padding: 0.5vh 0;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 2vw;
            flex-shrink: 0;
        }
        .type-local { background: #333333; color: #fff; border: 1px solid #444; }
        .type-semi  { background: #9acd32; color: #000; }
        .type-rapid { background: #1e90ff; color: #fff; }
        .type-exp   { background: #ff4500; color: #fff; }
        
        /* 行き先 */
        .bbs-dest { 
            flex-grow: 1; 
            text-align: left; 
            padding-left: 3vw; 
            color: #fff; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            font-size: 4.2vh;
        }
        
        /* 下部ステータスバー */
        .footer-status {
            background: #0a0a0a;
            border: 2px solid #222;
            border-radius: 6px;
            padding: 0.5vh 1.5vw;
            font-size: 2vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 5vh;
        }
        .status-badge { padding: 0.2vh 1vw; border-radius: 4px; font-weight: bold; font-size: 1.8vh; }
        .bg-green { background: #218838; color: #fff; }
        .bg-red { background: #c82333; color: #fff; }
        
        /* ★免責注釈が入るフッターエリア（16:9を維持するため横並び、かつ文字を小さめに調整） */
        .footer-note-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 3vh;
            padding: 0 1vw;
            font-size: 1.4vh;
            color: #555;
        }
        .update-time { font-weight: bold; }
        .disclaimer { text-align: right; color: #444; }
    </style>
</head>
<body>

    <div class="top-header">
        <span class="board-title">近隣駅列車運行状況</span>
        <span class="clock" id="live-clock">00:00:00</span>
    </div>
    
    <div id="station-container" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
        <div style="text-align: center; color: #555; font-size: 3vh;">
            時刻表データ更新中...
        </div>
    </div>

    <div class="footer-status" id="status-bar" style="display: none;">
        <span id="current-station-type">運行情報</span>
        <span class="status-badge bg-green" id="current-status-text">平常運転</span>
    </div>

    <div class="footer-note-area">
        <span class="update-time" id="update-time">Update: --:--:--</span>
        <span class="disclaimer">※本データは目安であり、実際の列車への乗車を確約・保証するものではありません。</span>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbwPB-yNfOTLHc8IslqUmBvGc6jjtEhq18KQairLUbfVB86nr5My3tHzIi8TZI5241pPsg/exec";
        let cachedData = null;
        let currentStationIndex = 0;
        const stationsList = ['nakano_shimbashi', 'nishi_shinjuku', 'hatagaya'];
        
        const stationNames = {
            'nakano_shimbashi': '丸ノ内線 中野新橋駅',
            'nishi_shinjuku': '大江戸線 西新宿五丁目駅',
            'hatagaya': '京王新線 幡ヶ谷駅'
        };

        const headerColorClasses = {
            'nakano_shimbashi': 'header-marunouchi',
            'nishi_shinjuku': 'header-oedo',
            'hatagaya': 'header-keio'
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchTrainInfo() {
            try {
                const response = await fetch(gasUrl);
                cachedData = await response.json();
                document.getElementById('update-time').innerText = "Update: " + new Date().toLocaleTimeString();
                if(document.getElementById('status-bar').style.display === 'none') {
                    renderNextStation();
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('update-time').innerText = "GASデータ通信エラー";
            }
        }

        function getTypeClass(typeStr) {
            if (!typeStr) return "type-local";
            if (typeStr.includes("区急") || typeStr.includes("区間急行")) return "type-semi";
            if (typeStr.includes("快速")) return "type-rapid";
            if (typeStr.includes("急行") || typeStr.includes("特急")) return "type-exp";
            return "type-local";
        }

        function renderNextStation() {
            if (!cachedData) return;
            
            try {
                const container = document.getElementById('station-container');
                const statusBar = document.getElementById('status-bar');
                const statusText = document.getElementById('current-status-text');
                const stationType = document.getElementById('current-station-type');
                
                const stationId = stationsList[currentStationIndex];
                const stationData = cachedData[stationId];
                if (!stationData) {
                    currentStationIndex = (currentStationIndex + 1) % stationsList.length;
                    return;
                }
                
                const displayName = stationNames[stationId];
                const headerColorClass = headerColorClasses[stationId] || '';
                
                statusBar.style.display = 'flex';
                
                const parts = displayName.split(/[  ]/); 
                stationType.innerText = (parts.length > 0 ? parts[0] : "列車") + " 運行状況";
                
                statusText.innerText = stationData.status || "平常運転";
                statusText.className = (statusText.innerText.includes("平常")) ? "status-badge bg-green" : "status-badge bg-red";
                
                let html = '<div class="station-card"><div class="station-name ' + headerColorClass + '">' + displayName + '</div>';
                
                const walkTrains = stationData.walk_trains || {};
                const dashTrains = stationData.dash_trains || {};
                const directions = Object.keys(walkTrains);
                
                let delayCounter = 0;
                
                directions.forEach(dir => {
                    const w = walkTrains[dir] || {time:"--:--", type:"各停", dest:"不明"};
                    const d = dashTrains[dir] || w;
                    
                    const dashStyle = (d.time === w.time) ? 'style="display: none;"' : '';
                    const dTypeClass = getTypeClass(d.type);
                    const wTypeClass = getTypeClass(w.type);
                    
                    html += '<div class="direction-block">';
                    html += '<div class="direction-name">▼ ' + dir + '</div>';
                    
                    // 急げば乗れる行
                    html += '<div class="bbs-row flop-anime" ' + dashStyle + ' style="animation-delay: ' + (delayCounter * 0.06) + 's;">';
                    html += '<span class="bbs-mode bg-dash">急げば乗れる</span>';
                    html += '<span class="bbs-time">' + d.time + '</span>';
                    html += '<span class="type-badge ' + dTypeClass + '">' + d.type + '</span>';
                    html += '<span class="bbs-dest">' + d.dest + '</span>';
                    html += '</div>';
                    delayCounter++;
                    
                    // 徒歩でも余裕行
                    html += '<div class="bbs-row flop-anime" style="animation-delay: ' + (delayCounter * 0.06) + 's;">';
                    html += '<span class="bbs-mode bg-walk">徒歩でも余裕</span>';
                    html += '<span class="bbs-time">' + w.time + '</span>';
                    html += '<span class="type-badge ' + wTypeClass + '">' + w.type + '</span>';
                    html += '<span class="bbs-dest">' + w.dest + '</span>';
                    html += '</div>';
                    delayCounter++;
                    
                    html += '</div>';
                });
                
                html += '</div>';
                container.innerHTML = html;
                
            } catch (err) {
                console.error("Render Error:", err);
            } finally {
                currentStationIndex = (currentStationIndex + 1) % stationsList.length;
            }
        }

        fetchTrainInfo();
        setInterval(fetchTrainInfo, 60000);
        setInterval(renderNextStation, 10000);
    </script>
</body>
</html>
